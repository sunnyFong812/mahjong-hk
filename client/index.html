<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港式麻雀 Online - 4人聯機</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 將 style 搬返嚟 head 入面 */
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 9999;
            color: white;
        }
        .connection-status.status-connected { background: #28a745; }
        .connection-status.status-error { background: #dc3545; }
        .connection-status.status-connecting { background: #ffc107; color: black; }
        .status-disconnected { background: #dc3545; }
    </style>
</head>
<body>
    <!-- 連接狀態指示器 - 放喺 body 入面最頂 -->
    <div id="connection-status" class="connection-status status-disconnected">未連接</div>

    <div class="container">
        <!-- 登入畫面 -->
        <div id="login-screen" class="screen">
            <div class="login-box">
                <h1>港式麻雀</h1>
                <div class="input-group">
                    <label>玩家名字</label>
                    <input type="text" id="player-name" placeholder="輸入名字" maxlength="10" value="玩家">
                </div>
                <div class="input-group">
                    <label>房間號碼</label>
                    <input type="text" id="room-id" placeholder="例如: 1234" value="test123">
                </div>
                <button onclick="joinRoom()" class="btn-primary">加入房間</button>
                <button onclick="createRoom()" class="btn-secondary">創建房間</button>
            </div>
        </div>
        
        <!-- 大廳畫面 -->
        <div id="lobby-screen" class="screen" style="display: none;">
            <div class="lobby-box">
                <h2>房間: <span id="display-room-id"></span></h2>
                
                <div class="players-container">
                    <div class="player-slot" id="player0">
                        <div class="position">東</div>
                        <div class="player-info">等待中...
                            <!-- 喺每個 player-slot 入面加個 AI 標籤 -->
<div class="ai-badge" style="display: none; background: #6c5ce7; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px;">AI</div>
                        </div>
                        <div class="ready-status"></div>
                    </div>
                    <div class="player-slot" id="player1">
                        <div class="position">南</div>
                        <div class="player-info">等待中...
                            <!-- 喺每個 player-slot 入面加個 AI 標籤 -->
<div class="ai-badge" style="display: none; background: #6c5ce7; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px;">AI</div>
                        </div>
                        <div class="ready-status"></div>
                    </div>
                    <div class="player-slot" id="player2">
                        <div class="position">西</div>
                        <div class="player-info">等待中...
                            <!-- 喺每個 player-slot 入面加個 AI 標籤 -->
<div class="ai-badge" style="display: none; background: #6c5ce7; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px;">AI</div>
                        </div>
                        <div class="ready-status"></div>
                    </div>
                    <div class="player-slot" id="player3">
                        <div class="position">北</div>
                        <div class="player-info">等待中...
                            <!-- 喺每個 player-slot 入面加個 AI 標籤 -->
<div class="ai-badge" style="display: none; background: #6c5ce7; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px;">AI</div>
                        </div>
                        <div class="ready-status"></div>
                    </div>
                </div>
                
                <div class="lobby-controls">
                    <button id="ready-button" onclick="toggleReady()" class="btn-primary">準備</button>
                    <button onclick="leaveRoom()" class="btn-danger">離開房間</button>
                </div>
                
                <div id="countdown" class="countdown" style="display: none;">
                    遊戲即將開始: <span id="countdown-seconds">3</span>
                </div>
            </div>
        </div>
        
        <!-- 遊戲畫面 -->
        <div id="game-screen" class="screen" style="display: none;">
            <canvas id="game-canvas" width="1200" height="700"></canvas>
            
            <div id="action-buttons" class="action-buttons">
                <button id="btn-chow" class="btn-action" disabled>吃</button>
                <button id="btn-pong" class="btn-action" disabled>碰</button>
                <button id="btn-kong" class="btn-action" disabled>槓</button>
                <button id="btn-mahjong" class="btn-action mahjong" disabled>食糊</button>
                <button id="btn-pass" class="btn-action" disabled>過</button>
            </div>
            
            <div id="game-info" class="game-info">
                <div id="wind-display"></div>
                <div id="scores-display"></div>
                <div id="wall-size"></div>
            </div>
            
            <div id="win-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h2>食糊！</h2>
                    <div id="win-details"></div>
                    <div id="win-total" class="win-total"></div>
                    <button onclick="closeWinModal()" class="btn-primary">確定</button>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ===== Socket 初始化 =====
const socket = io(window.location.origin);

// ===== 連接狀態 =====
socket.on('connect', () => {
    console.log('✅ 連接成功');
    document.getElementById('connection-status').textContent = '已連接';
    document.getElementById('connection-status').style.background = '#28a745';
});

// ===== 房間更新 =====
socket.on('roomUpdate', (data) => {
    console.log('📦 房間更新', data);
    
    for (let i = 0; i < 4; i++) {
        const slot = document.getElementById(`player${i}`);
        if (!slot) continue;
        
        const info = slot.querySelector('.player-info');
        
        if (data.players && data.players[i]) {
            const player = data.players[i];
            
            if (player.isAI) {
                info.innerHTML = player.name + ' <span class="ai-badge" style="background:#6c5ce7; color:white; padding:2px 8px; border-radius:10px; font-size:12px; margin-left:5px;">AI</span>';
                slot.classList.add('ready');
            } else {
                info.textContent = player.name;
                if (player.ready) {
                    slot.classList.add('ready');
                } else {
                    slot.classList.remove('ready');
                }
            }
        } else {
            info.textContent = '等待中...';
            slot.classList.remove('ready');
        }
    }
    
    // 顯示大廳
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('lobby-screen').style.display = 'block';
    document.getElementById('display-room-id').textContent = data.roomId;
    window.currentRoom = data.roomId;
});

// ===== 🎮 遊戲開始 =====
socket.on('gameStart', (data) => {
    console.log('🎮 遊戲開始', data);
    
    // 隱藏大廳，顯示遊戲畫面
    document.getElementById('lobby-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    
    // 儲存玩家資料
    window.myPosition = data.position;
    window.myHand = data.hand;
    window.currentPlayer = data.currentPlayer;
    
    // 更新遊戲資訊
    document.getElementById('wind-display').textContent = `門風: ${data.wind}`;
    document.getElementById('wall-size').textContent = `剩牌: ${data.wallSize || 68}`;
    
    // 初始化渲染器
    if (!window.gameRenderer) {
        window.gameRenderer = new MahjongRenderer('game-canvas');
    }
    
    // 渲染手牌
    window.gameRenderer.renderHand(data.hand, 200, 500);
});

// ===== 公共遊戲狀態 =====
socket.on('publicGameState', (data) => {
    console.log('📊 公共狀態', data);
    document.getElementById('wall-size').textContent = `剩牌: ${data.wallSize}`;
});

// ===== 遊戲更新（出牌、碰、槓等）=====
socket.on('gameUpdate', (data) => {
    console.log('🔄 遊戲更新', data);
    // 更新渲染
    if (window.gameRenderer) {
        window.gameRenderer.renderGame(data, window.myPosition);
    }
});

// ===== 簡易渲染器 =====
class MahjongRenderer {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.tileWidth = 40;
        this.tileHeight = 50;
    }
    
    renderHand(hand, startX, startY) {
        if (!hand || hand.length === 0) {
            console.log('⚠️ 冇手牌可渲染');
            return;
        }
        
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 畫背景
        this.ctx.fillStyle = '#2a6f2a';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 畫手牌
        hand.sort().forEach((tile, i) => {
            const x = startX + i * (this.tileWidth + 5);
            const y = startY;
            
            // 牌面
            this.ctx.fillStyle = '#f8f9fa';
            this.ctx.fillRect(x, y, this.tileWidth, this.tileHeight);
            this.ctx.strokeStyle = '#333';
            this.ctx.strokeRect(x, y, this.tileWidth, this.tileHeight);
            
            // 牌面文字
            this.ctx.fillStyle = this.getTileColor(tile);
            this.ctx.font = '20px Arial';
            this.ctx.fillText(this.getTileDisplay(tile), x + 5, y + 30);
        });
    }
    
    renderGame(gameState, myPosition) {
        // 簡單版渲染
        this.renderHand(gameState.hands[myPosition], 200, 500);
    }
    
    getTileColor(tile) {
        if (tile.includes('m')) return '#d32f2f';
        if (tile.includes('p')) return '#2e7d32';
        if (tile.includes('s')) return '#1976d2';
        return '#7b1fa2';
    }
    
    getTileDisplay(tile) {
        if (tile.includes('m')) return tile.replace('m', '萬');
        if (tile.includes('p')) return tile.replace('p', '筒');
        if (tile.includes('s')) return tile.replace('s', '條');
        return tile;
    }
}

// ===== 按鈕函數 =====
window.joinRoom = function() {
    const name = document.getElementById('player-name').value;
    const room = document.getElementById('room-id').value;
    
    if (socket && socket.connected) {
        socket.emit('joinRoom', { roomId: room, playerName: name });
        window.currentRoom = room;
    } else {
        alert('未連接到伺服器');
    }
};

window.createRoom = function() {
    const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('room-id').value = roomId;
    window.joinRoom();
};

window.toggleReady = function() {
    if (socket && socket.connected && window.currentRoom) {
        socket.emit('playerReady', { roomId: window.currentRoom });
    }
};

window.leaveRoom = function() {
    document.getElementById('lobby-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
};

window.closeWinModal = function() {
    document.getElementById('win-modal').style.display = 'none';
};

// ===== 橫屏支援 =====
function handleOrientationChange() {
    const canvas = document.getElementById('game-canvas');
    if (window.innerWidth > window.innerHeight) {
        // 橫屏
        canvas.width = 1200;
        canvas.height = 700;
        console.log('🔄 橫屏模式');
    } else {
        // 直屏
        canvas.width = 700;
        canvas.height = 1200;
        console.log('🔄 直屏模式');
    }
    
    // 重新渲染
    if (window.gameRenderer && window.myHand) {
        window.gameRenderer.renderHand(window.myHand, 100, 500);
    }
}

// 監聽屏幕旋轉
window.addEventListener('resize', handleOrientationChange);
handleOrientationChange(); // 初始化

console.log('✅ 前端初始化完成');
</script>
</body>
</html>
