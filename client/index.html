<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港式麻雀 Online - 4人聯機</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 將 style 搬返嚟 head 入面 */
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 9999;
            color: white;
        }
        .connection-status.status-connected { background: #28a745; }
        .connection-status.status-error { background: #dc3545; }
        .connection-status.status-connecting { background: #ffc107; color: black; }
        .status-disconnected { background: #dc3545; }
    </style>
</head>
<body>
    <!-- 連接狀態指示器 - 放喺 body 入面最頂 -->
    <div id="connection-status" class="connection-status status-disconnected">未連接</div>

    <div class="container">
        <!-- 登入畫面 -->
        <div id="login-screen" class="screen">
            <div class="login-box">
                <h1>港式麻雀</h1>
                <div class="input-group">
                    <label>玩家名字</label>
                    <input type="text" id="player-name" placeholder="輸入名字" maxlength="10" value="玩家">
                </div>
                <div class="input-group">
                    <label>房間號碼</label>
                    <input type="text" id="room-id" placeholder="例如: 1234" value="test123">
                </div>
                <button onclick="joinRoom()" class="btn-primary">加入房間</button>
                <button onclick="createRoom()" class="btn-secondary">創建房間</button>
            </div>
        </div>
        
        <!-- 大廳畫面 -->
        <div id="lobby-screen" class="screen" style="display: none;">
            <div class="lobby-box">
                <h2>房間: <span id="display-room-id"></span></h2>
                
                <div class="players-container">
                    <div class="player-slot" id="player0">
                        <div class="position">東</div>
                        <div class="player-info">等待中...</div>
                        <div class="ready-status"></div>
                    </div>
                    <div class="player-slot" id="player1">
                        <div class="position">南</div>
                        <div class="player-info">等待中...</div>
                        <div class="ready-status"></div>
                    </div>
                    <div class="player-slot" id="player2">
                        <div class="position">西</div>
                        <div class="player-info">等待中...</div>
                        <div class="ready-status"></div>
                    </div>
                    <div class="player-slot" id="player3">
                        <div class="position">北</div>
                        <div class="player-info">等待中...</div>
                        <div class="ready-status"></div>
                    </div>
                </div>
                
                <div class="lobby-controls">
                    <button id="ready-button" onclick="toggleReady()" class="btn-primary">準備</button>
                    <button onclick="leaveRoom()" class="btn-danger">離開房間</button>
                </div>
                
                <div id="countdown" class="countdown" style="display: none;">
                    遊戲即將開始: <span id="countdown-seconds">3</span>
                </div>
            </div>
        </div>
        
        <!-- 遊戲畫面 -->
        <div id="game-screen" class="screen" style="display: none;">
            <canvas id="game-canvas" width="1200" height="700"></canvas>
            
            <div id="action-buttons" class="action-buttons">
                <button id="btn-chow" class="btn-action" disabled>吃</button>
                <button id="btn-pong" class="btn-action" disabled>碰</button>
                <button id="btn-kong" class="btn-action" disabled>槓</button>
                <button id="btn-mahjong" class="btn-action mahjong" disabled>食糊</button>
                <button id="btn-pass" class="btn-action" disabled>過</button>
            </div>
            
            <div id="game-info" class="game-info">
                <div id="wind-display"></div>
                <div id="scores-display"></div>
                <div id="wall-size"></div>
            </div>
            
            <div id="win-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h2>食糊！</h2>
                    <div id="win-details"></div>
                    <div id="win-total" class="win-total"></div>
                    <button onclick="closeWinModal()" class="btn-primary">確定</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 用 CDN 代替本地路徑！呢句最關鍵 -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
// ===== 第 1 步：基本載入測試 =====
alert('0️⃣ Script 開始執行 - 如果睇到呢句，即係 JavaScript 正常載入');

// ===== 第 2 步：定義全域變數 =====
window.currentRoom = '';
window.playerName = '';
window.socket = null;

alert('1️⃣ 全域變數已定義');

// ===== 第 3 步：初始化 Socket =====
try {
    alert('2️⃣ 開始連接 Socket.IO...');
    
    window.socket = io(window.location.origin, {
        transports: ['polling', 'websocket'],
        reconnectionAttempts: 3,
        timeout: 5000
    });
    
    alert('3️⃣ Socket 初始化完成，等待連接...');
    
} catch (error) {
    alert('❌ Socket 初始化失敗: ' + error.message);
}

// ===== 第 4 步：Socket 事件監聽 =====
window.socket.on('connect', () => {
    alert('4️⃣ ✅ Socket 連接成功！');
    
    // 更新連接狀態顯示
    const statusEl = document.getElementById('connection-status');
    if (statusEl) {
        statusEl.textContent = '已連接';
        statusEl.style.background = '#28a745';
    }
});

window.socket.on('connect_error', (err) => {
    alert('5️⃣ ❌ Socket 連接錯誤: ' + err);
});

window.socket.on('roomUpdate', (data) => {
    alert('6️⃣ 📦 收到房間更新: ' + JSON.stringify(data));
});

// ===== 第 5 步：定義按鈕函數 =====
alert('7️⃣ 開始定義按鈕函數...');

// 加入房間
window.joinRoom = function() {
    alert('8️⃣ ▶️ joinRoom 函數被執行');
    
    // 攞輸入值
    const nameInput = document.getElementById('player-name');
    const roomInput = document.getElementById('room-id');
    
    if (!nameInput || !roomInput) {
        alert('❌ 搵唔到輸入框元素');
        return;
    }
    
    const name = nameInput.value.trim();
    const room = roomInput.value.trim();
    
    alert(`9️⃣ 輸入值: 房間 = ${room}, 玩家 = ${name}`);
    
    if (!name || !room) {
        alert('❌ 請輸入玩家名字同房間號碼');
        return;
    }
    
    // 檢查 Socket
    if (!window.socket) {
        alert('❌ socket 未初始化');
        return;
    }
    
    alert('🔟 Socket 連接狀態: ' + (window.socket.connected ? '已連接' : '未連接'));
    
    if (window.socket.connected) {
        alert('1️⃣1️⃣ 發送 joinRoom 事件...');
        window.socket.emit('joinRoom', {
            roomId: room,
            playerName: name
        });
        alert('1️⃣2️⃣ 已發送，等待伺服器回應');
        
        // 暫時顯示大廳
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('lobby-screen').style.display = 'block';
        document.getElementById('display-room-id').textContent = room;
        window.currentRoom = room;
        
        alert('1️⃣3️⃣ 已切換到大廳畫面');
    } else {
        alert('❌ Socket 未連接，請檢查伺服器');
    }
};

// 創建房間
window.createRoom = function() {
    alert('🎲 createRoom 被執行');
    const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('room-id').value = roomId;
    alert('新房間號碼: ' + roomId);
    window.joinRoom();
};

// 準備
window.toggleReady = function() {
    alert('✅ toggleReady 被執行');
    if (window.socket && window.socket.connected && window.currentRoom) {
        window.socket.emit('playerReady', {
            roomId: window.currentRoom
        });
        alert('已發送準備請求');
    } else {
        alert('Socket 未連接或冇房間');
    }
};

// 離開房間
window.leaveRoom = function() {
    alert('👋 leaveRoom 被執行');
    document.getElementById('lobby-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
};

// 關閉彈窗
window.closeWinModal = function() {
    document.getElementById('win-modal').style.display = 'none';
};

alert('1️⃣4️⃣ 所有函數定義完成');

// ===== 第 6 步：延遲檢查 Socket 狀態 =====
setTimeout(() => {
    if (window.socket && window.socket.connected) {
        alert('⏰ 延遲檢查: Socket 已連接 ✅');
    } else {
        alert('⏰ 延遲檢查: Socket 未連接 ❌');
    }
}, 3000);

alert('1️⃣5️⃣ Script 執行完畢，可以㩒按鈕測試');
</script>
</body>
</html>
