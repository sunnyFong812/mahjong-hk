<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>港式麻雀 - 16張牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'PingFang HK', Arial, sans-serif;
            background: #1a4d2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background-color: #2a6f2a;
            position: relative;
            overflow: hidden;
            border: 4px solid #8b5a2b;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(42, 111, 42, 0.95);
        }

        .login-box {
            width: 90%;
            max-width: 400px;
            margin: 20% auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        .login-box h1 {
            color: #d4a373;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 16px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 18px;
            margin: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: #d4a373;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-action {
            background: #ffd966;
            color: #333;
            border: 2px solid #b5835a;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            min-width: 60px;
        }

        .btn-action.mahjong {
            background: #ff6b6b;
            color: white;
        }

        .btn-action:disabled {
            opacity: 0.4;
        }

        .lobby-box {
            width: 90%;
            max-width: 600px;
            margin: 15% auto;
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
        }

        .players-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .player-slot {
            background: #f8f9fa;
            border: 3px solid #dee2e6;
            border-radius: 15px;
            padding: 15px;
            position: relative;
            min-height: 100px;
        }

        .player-slot.ready {
            border-color: #28a745;
            background: #d4edda;
        }

        .player-slot .position {
            position: absolute;
            top: -12px;
            left: 15px;
            background: #d4a373;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .player-slot .player-info {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .ai-badge {
            background: #6c5ce7;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 5px;
            display: inline-block;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .action-buttons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .game-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 10;
        }

        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 9999;
            color: white;
        }
        .status-connected { background: #28a745; }
        .status-disconnected { background: #dc3545; }

        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .countdown {
            text-align: center;
            margin-top: 20px;
            font-size: 24px;
            color: #d4a373;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="connection-status" class="connection-status status-disconnected">未連接</div>

    <div class="container">
        <!-- 登入畫面 -->
        <div id="login-screen" class="screen">
            <div class="login-box">
                <h1>🀄️ 港式麻雀</h1>
                <div class="input-group">
                    <label>玩家名字</label>
                    <input type="text" id="player-name" value="玩家" maxlength="10">
                </div>
                <div class="input-group">
                    <label>房間號碼</label>
                    <input type="text" id="room-id" value="test123">
                </div>
                <button onclick="window.joinRoom()" class="btn btn-primary">加入房間</button>
                <button onclick="window.createRoom()" class="btn btn-secondary">創建房間</button>
            </div>
        </div>
        
        <!-- 大廳畫面 -->
        <div id="lobby-screen" class="screen" style="display: none;">
            <div class="lobby-box">
                <h2>房間: <span id="display-room-id"></span></h2>
                
                <div class="players-container">
                    <div class="player-slot" id="player0">
                        <div class="position">東</div>
                        <div class="player-info">等待中...</div>
                    </div>
                    <div class="player-slot" id="player1">
                        <div class="position">南</div>
                        <div class="player-info">等待中...</div>
                    </div>
                    <div class="player-slot" id="player2">
                        <div class="position">西</div>
                        <div class="player-info">等待中...</div>
                    </div>
                    <div class="player-slot" id="player3">
                        <div class="position">北</div>
                        <div class="player-info">等待中...</div>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button id="ready-button" onclick="window.toggleReady()" class="btn btn-primary">準備</button>
                    <button onclick="window.leaveRoom()" class="btn btn-danger">離開</button>
                </div>
                
                <div id="countdown" style="display: none; text-align: center; margin-top: 20px; font-size: 24px;">
                    遊戲開始倒數: <span id="countdown-seconds">3</span>
                </div>
            </div>
        </div>
        
        <!-- 遊戲畫面 -->
        <div id="game-screen" class="screen" style="display: none;">
            <canvas id="game-canvas" width="1200" height="700"></canvas>
            
            <div class="action-buttons">
                <button id="btn-chow" class="btn-action" disabled>吃</button>
                <button id="btn-pong" class="btn-action" disabled>碰</button>
                <button id="btn-kong" class="btn-action" disabled>槓</button>
                <button id="btn-mahjong" class="btn-action mahjong" disabled>食糊</button>
                <button id="btn-pass" class="btn-action" disabled>過</button>
            </div>
            
            <div class="game-info">
                <div id="wind-display">門風: 東</div>
                <div id="scores-display">分數: 0</div>
                <div id="wall-size">剩牌: 68</div>
            </div>
            
            <div id="selected-tile-hint" style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: gold; padding: 8px 15px; border-radius: 20px; display: none; z-index: 200;">
                👆 點擊手牌選擇，再點擊同一張打出
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ===== Socket 初始化 =====
        const socket = io(window.location.origin);
        
        // ===== 全域變數 =====
        window.currentRoom = '';
        window.myPosition = -1;
        window.myHand = [];
        window.selectedTileIndex = -1;
        window.gameRenderer = null;
        window.currentPlayer = -1;
        window.discards = {};  // 棄牌區
        window.canPongTile = null; // 可以碰的牌

        // ===== 牌型排序函數 =====
        function sortTiles(tiles) {
            if (!tiles) return [];
            
            const suitOrder = { 'm': 0, 'p': 1, 's': 2, '東': 3, '南': 4, '西': 5, '北': 6, '中': 7, '發': 8, '白': 9 };
            
            return [...tiles].sort((a, b) => {
                let suitA = 'z', suitB = 'z';
                let numA = 0, numB = 0;
                
                if (a.match(/^\d+[mps]$/)) {
                    suitA = a.slice(-1);
                    numA = parseInt(a);
                } else {
                    suitA = a;
                }
                
                if (b.match(/^\d+[mps]$/)) {
                    suitB = b.slice(-1);
                    numB = parseInt(b);
                } else {
                    suitB = b;
                }
                
                const orderA = suitOrder[suitA] || 99;
                const orderB = suitOrder[suitB] || 99;
                
                if (orderA !== orderB) {
                    return orderA - orderB;
                }
                
                if (suitA === suitB) {
                    return numA - numB;
                }
                
                return 0;
            });
        }

        // ===== 連接狀態 =====
        socket.on('connect', () => {
            console.log('✅ 連接成功');
            document.getElementById('connection-status').textContent = '已連接';
            document.getElementById('connection-status').className = 'connection-status status-connected';
        });

        socket.on('connect_error', (err) => {
            console.error('❌ 連接錯誤:', err);
            document.getElementById('connection-status').textContent = '連接失敗';
            document.getElementById('connection-status').className = 'connection-status status-disconnected';
        });

        socket.on('disconnect', () => {
            console.log('❌ 與伺服器斷線');
            document.getElementById('connection-status').textContent = '未連接';
            document.getElementById('connection-status').className = 'connection-status status-disconnected';
            window.currentRoom = '';
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        });

        socket.on('reconnect', () => {
            console.log('🔄 重新連線成功');
            document.getElementById('connection-status').textContent = '已連接';
            document.getElementById('connection-status').className = 'connection-status status-connected';
        });

        // ===== 房間更新 =====
        socket.on('roomUpdate', (data) => {
            console.log('📦 房間更新', data);

            // 強制記錄 currentRoom
            window.currentRoom = data.roomId;
            console.log('✅ currentRoom 已設為:', window.currentRoom);

            for (let i = 0; i < 4; i++) {
                const slot = document.getElementById(`player${i}`);
                if (!slot) continue;

                const info = slot.querySelector('.player-info');

                if (data.players && data.players[i]) {
                    const player = data.players[i];

                    if (player.isAI) {
                        info.innerHTML = player.name + ' <span class="ai-badge">AI</span>';
                        slot.classList.add('ready');
                    } else {
                        info.textContent = player.name;
                        if (player.ready) {
                            slot.classList.add('ready');
                        } else {
                            slot.classList.remove('ready');
                        }
                    }
                } else {
                    info.textContent = '等待中...';
                    slot.classList.remove('ready');
                }
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'block';
            document.getElementById('display-room-id').textContent = data.roomId;
        });

        // ===== 遊戲開始 =====
        socket.on('gameStart', (data) => {
            console.log('🎮 遊戲開始', data);
            
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            window.myPosition = data.position;
            
            // 莊家（東位）有17張，其他16張
            if (data.position === 0) {
                window.myHand = sortTiles(data.hand || []);
                console.log('🎲 你是莊家，有 17 張牌');
            } else {
                window.myHand = sortTiles(data.hand || []);
            }
            
            window.currentPlayer = data.currentPlayer;
            window.discards = data.discards || { 0: [], 1: [], 2: [], 3: [] };
            
            document.getElementById('wind-display').textContent = `門風: ${data.wind}`;
            document.getElementById('wall-size').textContent = `剩牌: ${data.wallSize || 68}`;
            
            // 初始化渲染器
            if (!window.gameRenderer) {
                window.gameRenderer = new MahjongRenderer('game-canvas');
            }
            
            // 渲染
            window.gameRenderer.render(window.myHand, window.myPosition, window.discards);
            
            // 如果係自己回合，顯示提示
            if (data.currentPlayer === window.myPosition) {
                document.getElementById('selected-tile-hint').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('selected-tile-hint').style.display = 'none';
                }, 5000);
            }
        });

        // ===== 遊戲更新 =====
        socket.on('gameUpdate', (data) => {
            console.log('🔄 gameUpdate', data);

            if (data.currentPlayer !== undefined) {
                window.currentPlayer = data.currentPlayer;
            }

            if (data.hand && data.player === window.myPosition) {
                window.myHand = sortTiles(data.hand);
            }

            if (data.discards) {
                window.discards = data.discards;
            }
            if (data.melds) {
    window.melds = data.melds;
}

            // 處理 reactions（碰、槓、糊按鈕）
            if (data.reactions) {
                const myReaction = data.reactions.find(r => r.player === window.myPosition);
                if (myReaction) {
                    document.getElementById('btn-pong').disabled = !myReaction.actions.includes('PONG');
                    document.getElementById('btn-chow').disabled = !myReaction.actions.includes('CHOW');
                    document.getElementById('btn-kong').disabled = !myReaction.actions.includes('KONG');
                    document.getElementById('btn-mahjong').disabled = !myReaction.actions.includes('MAHJONG');
                    window.canPongTile = myReaction.actions.includes('PONG') ? data.tile : null;
                } else {
                    document.getElementById('btn-pong').disabled = true;
                    document.getElementById('btn-chow').disabled = true;
                    document.getElementById('btn-kong').disabled = true;
                    document.getElementById('btn-mahjong').disabled = true;
                    window.canPongTile = null;
                }
            } else {
                document.getElementById('btn-pong').disabled = true;
                document.getElementById('btn-chow').disabled = true;
                document.getElementById('btn-kong').disabled = true;
                document.getElementById('btn-mahjong').disabled = true;
                window.canPongTile = null;
            }

            if (window.gameRenderer) {
                window.gameRenderer.render(window.myHand, window.myPosition, window.discards);
            }

            if (window.currentPlayer === window.myPosition) {
                document.getElementById('selected-tile-hint').style.display = 'block';
            } else {
                document.getElementById('selected-tile-hint').style.display = 'none';
            }
        });

        // ===== 渲染器 =====
class MahjongRenderer {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.tileWidth = 45;
        this.tileHeight = 60;
        this.selectedIndex = -1;
        
        // 綁定點擊事件
        this.canvas.addEventListener('click', (e) => this.handleClick(e));
    }
    
    handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = this.canvas.width / rect.width;
        const scaleY = this.canvas.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        
        console.log(`🖱️ 點擊位置: (${x}, ${y})`);
        
        // 檢查手牌區域 (最多17張)
        const startX = 50;
        const startY = 550;
        
        for (let i = 0; i < window.myHand.length; i++) {
            const tileX = startX + i * (this.tileWidth + 3);
            
            if (x >= tileX && x <= tileX + this.tileWidth &&
                y >= startY && y <= startY + this.tileHeight) {
                
                console.log(`🎯 點擊手牌 ${i}: ${window.myHand[i]}, 當前選擇: ${this.selectedIndex}`);
                
                if (this.selectedIndex === i) {
                    // 同一張牌㩒兩次 = 打出
                    if (window.currentPlayer === window.myPosition) {
                        console.log('🎯 打出:', window.myHand[i]);
                        
                        // 發送打牌事件
                        socket.emit('playerAction', {
                            roomId: window.currentRoom,
                            action: 'DISCARD',
                            tile: window.myHand[i]
                        });
                        
                        this.selectedIndex = -1;
                        document.getElementById('selected-tile-hint').style.display = 'none';
                    } else {
                        alert('⚠️ 唔係你嘅回合');
                        this.selectedIndex = -1;
                    }
                } else {
                    // 選擇新牌
                    this.selectedIndex = i;
                    document.getElementById('selected-tile-hint').style.display = 'block';
                    document.getElementById('selected-tile-hint').textContent = `✅ 已選中 ${this.getTileDisplay(window.myHand[i])}，再點擊打出`;
                }
                
                this.render(window.myHand, window.myPosition, window.discards);
                break;
            }
        }
    }
    
    // 新增：畫副露（碰、槓嘅牌）
    renderMelds(melds, myPosition) {
        if (!melds || !melds[myPosition]) return;
        
        const myMelds = melds[myPosition];
        const startX = 200;
        const startY = 400;
        
        myMelds.forEach((meld, index) => {
            const x = startX + index * 120;
            
            // 畫框
            this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            this.ctx.fillRect(x - 5, startY - 5, 100, 70);
            this.ctx.strokeStyle = '#d4a373';
            this.ctx.lineWidth = 2;
            this.ctx.strokeRect(x - 5, startY - 5, 100, 70);
            
            // 畫牌
            if (meld.type === 'PONG') {
                for (let i = 0; i < 3; i++) {
                    this.ctx.fillStyle = '#f8f9fa';
                    this.ctx.fillRect(x + i * 30, startY, 25, 35);
                    this.ctx.strokeStyle = '#333';
                    this.ctx.strokeRect(x + i * 30, startY, 25, 35);
                    
                    this.ctx.fillStyle = this.getTileColor(meld.tile);
                    this.ctx.font = '14px Arial';
                    this.ctx.fillText(this.getTileDisplay(meld.tile), x + i * 30 + 3, startY + 22);
                }
            }
        });
    }
    
    render(hand, myPosition, discards) {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 背景
        this.ctx.fillStyle = '#2a6f2a';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // 畫棄牌區 (台中間)
        this.renderDiscardArea(discards);
        
        // 畫副露 (自己面前)
        if (window.melds) {
            this.renderMelds(window.melds, myPosition);
        }
        
        // 顯示手牌數量
        this.ctx.fillStyle = 'white';
        this.ctx.font = '20px Arial';
        this.ctx.fillText(`手牌: ${hand.length} 張`, 20, 50);
        
        // 手牌 (最多17張)
        const startX = 50;
        const startY = 550;
        
        hand.forEach((tile, i) => {
            const x = startX + i * (this.tileWidth + 3);
            
            // 牌面
            this.ctx.fillStyle = '#f8f9fa';
            this.ctx.fillRect(x, startY, this.tileWidth, this.tileHeight);
            
            // 邊框 - 選中時金色
            this.ctx.strokeStyle = (i === this.selectedIndex) ? 'gold' : '#333';
            this.ctx.lineWidth = (i === this.selectedIndex) ? 4 : 1;
            this.ctx.strokeRect(x, startY, this.tileWidth, this.tileHeight);
            
            // 牌面文字
            this.ctx.fillStyle = this.getTileColor(tile);
            this.ctx.font = 'bold 24px "PingFang HK"';
            this.ctx.fillText(this.getTileDisplay(tile), x + 5, startY + 40);
        });
        
        // 其他玩家 (簡單表示)
        this.ctx.fillStyle = 'white';
        this.ctx.font = '18px Arial';
        this.ctx.fillText('其他玩家', 500, 200);
        
        // 顯示當前玩家
        this.ctx.fillStyle = window.currentPlayer === myPosition ? 'gold' : 'white';
        this.ctx.fillText(`當前玩家: ${window.currentPlayer === myPosition ? '👈 你' : '其他'}`, 500, 250);
        
        // 顯示誰是莊家
        this.ctx.fillStyle = '#ffd700';
        this.ctx.fillText('莊家: 東位', 500, 300);
    }
    
    renderDiscardArea(discards) {
        if (!discards) return;
        
        const centerX = 500;
        const centerY = 350;
        
        this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
        this.ctx.fillRect(centerX - 200, centerY - 100, 400, 200);
        
        this.ctx.strokeStyle = '#d4a373';
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(centerX - 200, centerY - 100, 400, 200);
        
        this.ctx.fillStyle = 'white';
        this.ctx.font = '16px Arial';
        this.ctx.fillText('棄牌區', centerX - 30, centerY - 80);
        
        // 顯示最近打出的牌
        let x = centerX - 180;
        let y = centerY - 50;
        
        for (let i = 0; i < 4; i++) {
            const playerDiscards = discards[i] || [];
            const lastTiles = playerDiscards.slice(-6);
            
            lastTiles.forEach((tile, index) => {
                this.ctx.fillStyle = '#f8f9fa';
                this.ctx.fillRect(x + index * 30, y + i * 40, 25, 35);
                this.ctx.strokeStyle = '#333';
                this.ctx.strokeRect(x + index * 30, y + i * 40, 25, 35);
                
                this.ctx.fillStyle = this.getTileColor(tile);
                this.ctx.font = '14px Arial';
                this.ctx.fillText(this.getTileDisplay(tile), x + index * 30 + 3, y + i * 40 + 22);
            });
        }
    }
    
    getTileColor(tile) {
        if (tile.includes('m')) return '#d32f2f';
        if (tile.includes('p')) return '#2e7d32';
        if (tile.includes('s')) return '#1976d2';
        return '#7b1fa2';
    }
    
    getTileDisplay(tile) {
        if (tile.includes('m')) return tile.replace('m', '萬');
        if (tile.includes('p')) return tile.replace('p', '筒');
        if (tile.includes('s')) return tile.replace('s', '條');
        return tile;
    }
}
        // ===== 按鈕函數 =====
        window.joinRoom = function() {
            const name = document.getElementById('player-name').value.trim();
            const room = document.getElementById('room-id').value.trim();

            if (!name || !room) {
                alert('❌ 請輸入名字同房間號碼');
                return;
            }

            if (!socket || !socket.connected) {
                alert('❌ 未連接到伺服器');
                return;
            }

            console.log('📤 發送 joinRoom:', room, name);
            socket.emit('joinRoom', { roomId: room, playerName: name });
        };

        window.createRoom = function() {
            const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-id').value = roomId;
            window.joinRoom();
        };

        window.toggleReady = function() {
            if (!socket || !socket.connected) {
                alert('❌ 未連接到伺服器');
                return;
            }

            if (!window.currentRoom) {
                alert('❌ 未加入房間 (currentRoom 係空)');
                console.log('❌ currentRoom:', window.currentRoom);
                return;
            }

            console.log('📤 發送 playerReady:', window.currentRoom);
            socket.emit('playerReady', { roomId: window.currentRoom });
        };
        
        window.leaveRoom = function() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            window.currentRoom = '';
        };

        window.closeWinModal = function() {
            document.getElementById('win-modal').style.display = 'none';
        };

        // ===== 橫屏處理 =====
        function handleOrientation() {
            const canvas = document.getElementById('game-canvas');
            if (window.innerWidth > window.innerHeight) {
                canvas.width = 1200;
                canvas.height = 700;
            } else {
                canvas.width = 700;
                canvas.height = 1200;
            }
            if (window.gameRenderer && window.myHand) {
                window.gameRenderer.render(window.myHand, window.myPosition, window.discards);
            }
        }
        
        window.addEventListener('resize', handleOrientation);
        handleOrientation();

        console.log('✅ 前端初始化完成');
    </script>
