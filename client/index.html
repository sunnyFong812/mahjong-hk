<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>港式麻雀 - 16張牌</title>
    <style>
        /* ===== 基礎設定 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'PingFang HK', Arial, sans-serif;
            background: #1a4d2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background-color: #2a6f2a;
            position: relative;
            overflow: hidden;
            border: 4px solid #8b5a2b;
        }

        .screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(42, 111, 42, 0.95);
        }

        /* ===== 登入畫面 ===== */
        .login-box {
            width: min(90%, 400px);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .login-box h1 {
            color: #d4a373;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 16px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            background: white;
        }

        /* ===== 大廳畫面 ===== */
        .lobby-box {
            width: min(90%, 500px);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .lobby-box h2 {
            color: #d4a373;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .players-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .player-slot {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 8px;
            position: relative;
            aspect-ratio: 4/3;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .player-slot.ready {
            border-color: #28a745;
            background: #d4edda;
        }

        .player-slot .position {
            position: absolute;
            top: -8px;
            left: 8px;
            background: #d4a373;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .player-slot .player-info {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            word-break: break-word;
        }

        .ai-badge {
            background: #6c5ce7;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 5px;
            display: inline-block;
        }

        .lobby-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .countdown {
            margin-top: 15px;
            font-size: 24px;
            color: #d4a373;
            font-weight: bold;
        }

        /* ===== 按鈕 ===== */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-primary {
            background: #d4a373;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        /* ===== 遊戲畫面 ===== */
        #game-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(42, 111, 42, 0.95);
        }

        /* 手牌區域 */
        .hand-area {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    height: 100vh;        /* 用 60% 畫面高度 */
    min-height: 400px;   /* 最少 400px */
    text-align: center;
    z-index: 10;
    pointer-events: none;
}

#game-canvas {
    width: 100%;
    height: 100%;        /* 填滿成個 .hand-area */
    display: block;
    margin: 0 auto;
    touch-action: none;
    pointer-events: auto;
}

        
        /* 過按鈕 */
        .btn-pass-new {
            position: absolute;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            padding: 12px 0;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 30;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            text-align: center;
        }

        .btn-pass-new.active {
            display: block;
        }

        /* 糊按鈕 */
        .btn-mahjong-new {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: #ff6b6b;
            color: white;
            border: 3px solid #c92a2a;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 40;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            align-items: center;
            justify-content: center;
        }

        .btn-mahjong-new.active {
            display: flex;
        }

        /* 左邊按鈕 */
        .left-buttons {
            position: absolute;
            bottom: 260px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
            width: 120px;
        }

        /* 右邊按鈕 */
        .right-buttons {
            position: absolute;
            bottom: 260px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
            width: 120px;
        }

        /* 牌型按鈕 */
        .btn-tile-group {
            width: 100%;
            padding: 8px 5px;
            background: #ffd966;
            border: 2px solid #b5835a;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .btn-tile-group.active {
            display: block;
        }

        /* 遊戲資訊 */
        .game-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 100;
            min-width: 150px;
            line-height: 1.6;
        }

        /* 手牌數顯示 */
        .players-hand-count {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            z-index: 100;
            border: 1px solid #d4a373;
            min-width: 120px;
            line-height: 1.6;
        }

        .player-hand {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .player-hand.ai-hand {
            color: #ffd966;
        }

        /* 連接狀態 */
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 9999;
            color: white;
        }

        .status-connected { background: #28a745; }
        .status-disconnected { background: #dc3545; }

        /* 提示文字 */
        #selected-tile-hint {
            position: absolute;
            bottom: 190px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: gold;
            padding: 8px 16px;
            border-radius: 20px;
            display: none;
            z-index: 200;
            font-size: 15px;
            white-space: nowrap;
        }

        /* 彈窗 */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .win-total {
            font-size: 36px;
            color: #d4a373;
            margin: 20px 0;
            font-weight: bold;
        }

        #win-details {
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .win-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
        }

        /* ===== 橫屏優化 ===== */
        @media (orientation: landscape) {
            .hand-area {
                bottom: 15px;
            }
            
            #game-canvas {
                
            }
            
            .btn-pass-new {
                bottom: 180px;
            }
            
            .left-buttons, .right-buttons {
                bottom: 220px;
            }
            
            #selected-tile-hint {
                bottom: 150px;
            }
        }

        /* ===== 手機直屏優化 ===== */
        @media (max-width: 600px) {
            .hand-area {
                bottom: 10px;
            }
            
            #game-canvas {
                
                min-height: 100px;
            }
            
            .btn-pass-new {
                bottom: 170px;
                width: 80px;
                font-size: 16px;
                padding: 8px 0;
            }
            
            .left-buttons, .right-buttons {
                bottom: 200px;
                width: 90px;
            }
            
            .btn-tile-group {
                font-size: 13px;
                padding: 6px 3px;
            }
            
            .game-info, .players-hand-count {
                padding: 8px 12px;
                font-size: 13px;
            }
        }

        /* 超小屏幕 */
        @media (max-width: 400px) {
            .left-buttons, .right-buttons {
                width: 80px;
            }
            
            .btn-tile-group {
                font-size: 11px;
                padding: 4px 2px;
            }
        }
    </style>
</head>
<body>
    <div id="connection-status" class="connection-status status-disconnected">未連接</div>

    <div class="container">
        <!-- 登入畫面 -->
        <div id="login-screen" class="screen">
            <div class="login-box">
                <h1>🀄️ 港式麻雀</h1>
                <div class="input-group">
                    <label>玩家名字</label>
                    <input type="text" id="player-name" value="玩家" maxlength="10">
                </div>
                <div class="input-group">
                    <label>房間號碼</label>
                    <input type="text" id="room-id" value="test123">
                </div>
                <button onclick="window.joinRoom()" class="btn btn-primary">加入房間</button>
                <button onclick="window.createRoom()" class="btn btn-secondary">創建房間</button>
            </div>
        </div>
        
        <!-- 大廳畫面 -->
        <div id="lobby-screen" class="screen" style="display: none;">
            <div class="lobby-box">
                <h2>房間: <span id="display-room-id"></span></h2>
                
                <div class="players-container">
                    <div class="player-slot" id="player0">
                        <div class="position">東</div>
                        <div class="player-info">等待中...</div>
                    </div>
                    <div class="player-slot" id="player1">
                        <div class="position">南</div>
                        <div class="player-info">等待中...</div>
                    </div>
                    <div class="player-slot" id="player2">
                        <div class="position">西</div>
                        <div class="player-info">等待中...</div>
                    </div>
                    <div class="player-slot" id="player3">
                        <div class="position">北</div>
                        <div class="player-info">等待中...</div>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button id="ready-button" onclick="window.toggleReady()" class="btn btn-primary">準備</button>
                    <button onclick="window.leaveRoom()" class="btn btn-danger">離開</button>
                </div>
                
                <div id="countdown" style="display: none; text-align: center; margin-top: 20px; font-size: 24px;">
                    遊戲開始倒數: <span id="countdown-seconds">3</span>
                </div>
            </div>
        </div>
        
        <!-- 遊戲畫面 -->
        <div id="game-screen" class="screen" style="display: none;">
            <!-- 玩家手牌數顯示 -->
            <div class="players-hand-count">
                <div class="player-hand" id="player0-hand">東: 0</div>
                <div class="player-hand" id="player1-hand">南: 0</div>
                <div class="player-hand" id="player2-hand">西: 0</div>
                <div class="player-hand" id="player3-hand">北: 0</div>
            </div>
            
            <!-- 手牌區域 -->
            <div class="hand-area">
                <canvas id="game-canvas" width="1200" height="700"></canvas>
            </div>
            
            <!-- 過按鈕 -->
            <button id="btn-pass-new" class="btn-pass-new">過</button>
            
            <!-- 糊按鈕 -->
            <button id="btn-mahjong-new" class="btn-mahjong-new">糊</button>
            
            <!-- 左邊按鈕（碰/槓） -->
            <div class="left-buttons" id="left-buttons"></div>
            
            <!-- 右邊按鈕（吃） -->
            <div class="right-buttons" id="right-buttons"></div>
            
            <!-- 隱藏舊按鈕 -->
            <div class="action-buttons" style="display: none;">
                <button id="btn-chow" class="btn-action" disabled>吃</button>
                <button id="btn-pong" class="btn-action" disabled>碰</button>
                <button id="btn-kong" class="btn-action" disabled>槓</button>
                <button id="btn-mahjong" class="btn-action mahjong" disabled>食糊</button>
                <button id="btn-pass" class="btn-action" disabled>過</button>
            </div>
            
            <div class="game-info">
                <div id="wind-display">門風: 東</div>
                <div id="scores-display">分數: 0</div>
                <div id="wall-size">剩牌: 68</div>
            </div>
            
            <div id="selected-tile-hint">
                👆 點擊手牌選擇，再點擊同一張打出
            </div>
        </div>
    </div>

    <!-- 食糊彈窗 -->
    <div id="win-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>🏆 食糊！</h2>
            <div id="win-details"></div>
            <div class="win-total" id="win-total"></div>
            <button onclick="closeWinModal()" class="btn btn-primary">確定</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ===== Socket 初始化 =====
        const socket = io(window.location.origin);
        
        // ===== 全域變數 =====
        window.currentRoom = '';
        window.myPosition = -1;
        window.myHand = [];
        window.selectedTileIndex = -1;
        window.gameRenderer = null;
        window.currentPlayer = -1;
        window.discards = {};
        window.canPongTile = null;
        window.canChowTile = null;
        window.chowFrom = null;
        window.canDiscard = true;
        window.melds = {};
        window.players = [];

        // ===== 牌型排序函數 =====
        function sortTiles(tiles) {
            if (!tiles) return [];
            
            const suitOrder = { 'm': 0, 'p': 1, 's': 2, '東': 3, '南': 4, '西': 5, '北': 6, '中': 7, '發': 8, '白': 9 };
            
            return [...tiles].sort((a, b) => {
                let suitA = 'z', suitB = 'z';
                let numA = 0, numB = 0;
                
                if (a.match(/^\d+[mps]$/)) {
                    suitA = a.slice(-1);
                    numA = parseInt(a);
                } else {
                    suitA = a;
                }
                
                if (b.match(/^\d+[mps]$/)) {
                    suitB = b.slice(-1);
                    numB = parseInt(b);
                } else {
                    suitB = b;
                }
                
                const orderA = suitOrder[suitA] || 99;
                const orderB = suitOrder[suitB] || 99;
                
                if (orderA !== orderB) {
                    return orderA - orderB;
                }
                
                if (suitA === suitB) {
                    return numA - numB;
                }
                
                return 0;
            });
        }

        // ===== 連接狀態 =====
        socket.on('connect', () => {
            console.log('✅ 連接成功');
            document.getElementById('connection-status').textContent = '已連接';
            document.getElementById('connection-status').className = 'connection-status status-connected';
        });

        socket.on('connect_error', (err) => {
            console.error('❌ 連接錯誤:', err);
            document.getElementById('connection-status').textContent = '連接失敗';
            document.getElementById('connection-status').className = 'connection-status status-disconnected';
        });

        socket.on('disconnect', () => {
            console.log('❌ 與伺服器斷線');
            document.getElementById('connection-status').textContent = '未連接';
            document.getElementById('connection-status').className = 'connection-status status-disconnected';
            window.currentRoom = '';
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        });

        socket.on('reconnect', () => {
            console.log('🔄 重新連線成功');
            document.getElementById('connection-status').textContent = '已連接';
            document.getElementById('connection-status').className = 'connection-status status-connected';
        });

        // ===== 房間更新 =====
        socket.on('roomUpdate', (data) => {
            console.log('📦 房間更新', data);

            window.currentRoom = data.roomId;
            console.log('✅ currentRoom 已設為:', window.currentRoom);

            for (let i = 0; i < 4; i++) {
                const slot = document.getElementById(`player${i}`);
                if (!slot) continue;

                const info = slot.querySelector('.player-info');

                if (data.players && data.players[i]) {
                    const player = data.players[i];

                    if (player.isAI) {
                        info.innerHTML = player.name + ' <span class="ai-badge">AI</span>';
                        slot.classList.add('ready');
                    } else {
                        info.textContent = player.name;
                        if (player.ready) {
                            slot.classList.add('ready');
                        } else {
                            slot.classList.remove('ready');
                        }
                    }
                } else {
                    info.textContent = '等待中...';
                    slot.classList.remove('ready');
                }
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'block';
            document.getElementById('display-room-id').textContent = data.roomId;
        });

        // ===== 更新手牌數顯示 =====
        function updateAllHandsCount() {
            console.log('🔄 更新手牌數');
            
            for (let i = 0; i < 4; i++) {
                const element = document.getElementById(`player${i}-hand`);
                if (!element) {
                    console.log(`❌ 搵唔到 player${i}-hand 元素`);
                    continue;
                }
                
                let handCount = 0;
                if (window.gameRenderer && window.gameRenderer.gameState && window.gameRenderer.gameState.hands) {
                    handCount = window.gameRenderer.gameState.hands[i]?.length || 0;
                } else if (i === window.myPosition && window.myHand) {
                    handCount = window.myHand.length;
                }
                
                const wind = ['東', '南', '西', '北'][i];
                element.textContent = `${wind}: ${handCount}`;
                
                if (window.players && window.players[i]?.isAI) {
                    element.classList.add('ai-hand');
                } else {
                    element.classList.remove('ai-hand');
                }
                
                console.log(`📊 玩家 ${i} (${wind}) 手牌: ${handCount}`);
            }
        }

        setInterval(updateAllHandsCount, 1000);

        // ===== 遊戲開始 =====
        socket.on('gameStart', (data) => {
            console.log('🎮 遊戲開始', data);
            
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            window.myPosition = data.position;
            window.myHand = sortTiles(data.hand || []);
            window.currentPlayer = data.currentPlayer;
            window.discards = data.discards || { 0: [], 1: [], 2: [], 3: [] };
            
            window.players = data.players || [
                { name: '玩家', isAI: false },
                { name: '🤖 阿倫', isAI: true },
                { name: '🤖 阿東', isAI: true },
                { name: '🤖 阿北', isAI: true }
            ];
            
            document.getElementById('wind-display').textContent = `門風: ${data.wind}`;
            document.getElementById('wall-size').textContent = `剩牌: ${data.wallSize || 68}`;
            
            if (!window.gameRenderer) {
                window.gameRenderer = new MahjongRenderer('game-canvas');
            }
            
            window.gameRenderer.gameState = {
                hands: data.hands || {}
            };
            
            window.gameRenderer.render(window.myHand, window.myPosition, window.discards);
            
            setTimeout(updateAllHandsCount, 100);
            setInterval(updateAllHandsCount, 2000);
            
            if (data.currentPlayer === window.myPosition) {
                document.getElementById('selected-tile-hint').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('selected-tile-hint').style.display = 'none';
                }, 5000);
            }
        });

        // ===== 輔助函數 =====
        function getTileDisplay(tile) {
            if (!tile) return '';
            if (tile.includes('m')) return tile.replace('m', '萬');
            if (tile.includes('p')) return tile.replace('p', '筒');
            if (tile.includes('s')) return tile.replace('s', '條');
            return tile;
        }

        function updateReactionButtons(reactions, dataTile, dataPlayer) {
            const leftButtons = document.getElementById('left-buttons');
            const rightButtons = document.getElementById('right-buttons');
            const passBtn = document.getElementById('btn-pass-new');
            const mahjongBtn = document.getElementById('btn-mahjong-new');
            
            leftButtons.innerHTML = '';
            rightButtons.innerHTML = '';
            
            if (!reactions) {
                passBtn.classList.remove('active');
                mahjongBtn.classList.remove('active');
                return;
            }
            
            const myReaction = reactions.find(r => r.player === window.myPosition);
            
            if (myReaction) {
                if (myReaction.actions.includes('MAHJONG')) {
                    mahjongBtn.classList.add('active');
                } else {
                    mahjongBtn.classList.remove('active');
                }
                
                if (myReaction.actions.includes('PONG')) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-tile-group active';
                    btn.innerHTML = `<span>[${getTileDisplay(dataTile)} ${getTileDisplay(dataTile)} ${getTileDisplay(dataTile)}]</span>`;
                    btn.onclick = () => {
                        socket.emit('playerAction', {
                            roomId: window.currentRoom,
                            action: 'PONG',
                            tile: dataTile,
                            targetPosition: dataPlayer
                        });
                        hideAllReactionButtons();
                    };
                    leftButtons.appendChild(btn);
                }
                
                if (myReaction.actions.includes('KONG')) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-tile-group active';
                    btn.innerHTML = `<span>[${getTileDisplay(dataTile)} ${getTileDisplay(dataTile)} ${getTileDisplay(dataTile)} ${getTileDisplay(dataTile)}]</span>`;
                    btn.onclick = () => {
                        socket.emit('playerAction', {
                            roomId: window.currentRoom,
                            action: 'KONG',
                            tile: dataTile,
                            targetPosition: dataPlayer
                        });
                        hideAllReactionButtons();
                    };
                    leftButtons.appendChild(btn);
                }
                
                if (myReaction.chowCombos && myReaction.chowCombos.length > 0) {
                    myReaction.chowCombos.forEach((combo, idx) => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-tile-group active';
                        btn.innerHTML = `<span>[${combo.map(t => getTileDisplay(t)).join('')}]</span>`;
                        btn.onclick = () => {
                            socket.emit('playerAction', {
                                roomId: window.currentRoom,
                                action: 'CHOW',
                                tile: dataTile,
                                targetPosition: myReaction.discardPlayer,
                                combination: combo
                            });
                            hideAllReactionButtons();
                        };
                        rightButtons.appendChild(btn);
                    });
                }
                
                passBtn.classList.add('active');
                
            } else {
                passBtn.classList.remove('active');
                mahjongBtn.classList.remove('active');
            }
        }
        
        function hideAllReactionButtons() {
            document.getElementById('left-buttons').innerHTML = '';
            document.getElementById('right-buttons').innerHTML = '';
            document.getElementById('btn-pass-new').classList.remove('active');
            document.getElementById('btn-mahjong-new').classList.remove('active');
        }

        // ===== 遊戲更新 =====
        socket.on('gameUpdate', (data) => {
            console.log('🔄 gameUpdate', data);
            
            if (data.currentPlayer !== undefined) {
                window.currentPlayer = data.currentPlayer;
            }

            if (data.hand && data.player === window.myPosition) {
                window.myHand = sortTiles(data.hand);
            }

            if (data.hand && data.player !== window.myPosition) {
                if (!window.gameState) window.gameState = {};
                if (!window.gameState.hands) window.gameState.hands = {};
                window.gameState.hands[data.player] = data.hand;
            }

            if (data.nextPlayerHand && data.currentPlayer !== undefined) {
                if (!window.gameState) window.gameState = {};
                if (!window.gameState.hands) window.gameState.hands = {};
                window.gameState.hands[data.currentPlayer] = data.nextPlayerHand;
            }
            
            if (data.discards) {
                window.discards = data.discards;
            }

            if (data.wallSize !== undefined) {
                document.getElementById('wall-size').textContent = `剩牌: ${data.wallSize}`;
            }
            
            if (data.melds) {
                window.melds = data.melds;
            }

            if (data.drawnTile && data.player === window.myPosition) {
                console.log('🀄️ 你摸到:', data.drawnTile);
                if (data.nextPlayerHand) {
                    window.myHand = sortTiles(data.nextPlayerHand);
                }
            }

            if (window.gameRenderer) {
                if (!window.gameRenderer.gameState) {
                    window.gameRenderer.gameState = {};
                }
                window.gameRenderer.gameState.hands = window.gameRenderer.gameState.hands || {};
                window.gameRenderer.gameState.hands[data.player] = data.hand;
                
                if (data.nextPlayerHand && data.player !== undefined) {
                    window.gameRenderer.gameState.hands[data.currentPlayer] = data.nextPlayerHand;
                }
            }

            if (data.reactions) {
                updateReactionButtons(data.reactions, data.tile, data.player);

                const myReaction = data.reactions.find(r => r.player === window.myPosition);

                if (myReaction) {
                    window.canPongTile = myReaction.actions.includes('PONG') ? data.tile : null;
                    window.canChowTile = myReaction.actions.includes('CHOW') ? data.tile : null;
                    window.chowFrom = data.player;
                    window.canDiscard = false;
                } else {
                    window.canPongTile = null;
                    window.canChowTile = null;
                    window.canDiscard = false;
                }
            } else {
                updateReactionButtons(null);
                window.canPongTile = null;
                window.canChowTile = null;
                window.canDiscard = true;
            }
            
            if (window.gameRenderer) {
                window.gameRenderer.render(window.myHand, window.myPosition, window.discards);
                setTimeout(updateAllHandsCount, 10);
            }

            if (window.currentPlayer === window.myPosition) {
                document.getElementById('selected-tile-hint').style.display = 'block';
            } else {
                document.getElementById('selected-tile-hint').style.display = 'none';
            }
        });

        // ===== 遊戲結束 =====
        socket.on('gameOver', (data) => {
            const modal = document.getElementById('win-modal');
            const details = document.getElementById('win-details');
            const total = document.getElementById('win-total');
            
            let html = '';
            if (data.details) {
                data.details.forEach(d => {
                    html += `<div class="win-detail-item">${d.name}: ${d.fan}番</div>`;
                });
            }
            
            details.innerHTML = html;
            total.textContent = `總共 ${data.fan || 0} 番`;
            
            modal.style.display = 'flex';
        });

        // ===== 渲染器 =====
        class MahjongRenderer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.tileWidth = 45;
                this.tileHeight = 60;
                this.selectedIndex = -1;
                this.gameState = {
                    hands: {}
                };
                
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
            }
            
            getTileColor(tile) {
                if (tile.includes('m')) return '#d32f2f';
                if (tile.includes('p')) return '#2e7d32';
                if (tile.includes('s')) return '#1976d2';
                return '#7b1fa2';
            }
            
            getTileDisplay(tile) {
                if (tile.includes('m')) return tile.replace('m', '萬');
                if (tile.includes('p')) return tile.replace('p', '筒');
                if (tile.includes('s')) return tile.replace('s', '條');
                return tile;
            }

// 計算副露牌總寬度
getMeldsWidth(melds, myPosition) {
    if (!melds || !melds[myPosition]) return 0;
    
    const myMelds = melds[myPosition];
    let totalWidth = 0;
    
    myMelds.forEach((meld) => {
        // 每組牌嘅數量 (PONG:3, CHOW:3, KONG:4)
        const tileCount = meld.type === 'KONG' ? 4 : 3;
        totalWidth += tileCount * 30;  // 每張牌 30px (28寬 + 2間距)
        totalWidth += 5;  // 組之間間距
    });
    
    return totalWidth;
}
            
            handleClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                const startX = 50;
                const startY = 550;
                
                for (let i = 0; i < window.myHand.length; i++) {
                    const tileX = startX + i * (this.tileWidth + 3);
                    
                    if (x >= tileX && x <= tileX + this.tileWidth &&
                        y >= startY && y <= startY + this.tileHeight) {
                        
                        if (this.selectedIndex === i) {
                            if (window.currentPlayer === window.myPosition) {
                                if (!window.canDiscard) {
                                    alert('⚠️ 而家唔可以打牌（請先處理碰/槓/糊）');
                                    this.selectedIndex = -1;
                                    return;
                                }
                                
                                socket.emit('playerAction', {
                                    roomId: window.currentRoom,
                                    action: 'DISCARD',
                                    tile: window.myHand[i]
                                });
                                
                                this.selectedIndex = -1;
                                document.getElementById('selected-tile-hint').style.display = 'none';
                            } else {
                                alert('⚠️ 唔係你嘅回合');
                                this.selectedIndex = -1;
                            }
                        } else {
                            this.selectedIndex = i;
                            document.getElementById('selected-tile-hint').style.display = 'block';
                            document.getElementById('selected-tile-hint').textContent = `✅ 已選中 ${this.getTileDisplay(window.myHand[i])}，再點擊打出`;
                        }
                        
                        this.render(window.myHand, window.myPosition, window.discards);
                        break;
                    }
                }
            }
            
            // 畫副露牌（橫向排列，喺手牌左方）
            renderMelds(melds, myPosition) {
                if (!melds || !melds[myPosition]) return;
                
                const myMelds = melds[myPosition];
                
                // 位置：手牌左方 (同手牌同一水平線)
                const startX = 20;
                const startY = 550;  // 同手牌 startY 一樣
                
                let currentX = startX;
                
                myMelds.forEach((meld) => {
                    // 決定要畫幾多張牌
                    let tiles = [];
                    if (meld.type === 'PONG') {
                        tiles = [meld.tile, meld.tile, meld.tile];
                    } else if (meld.type === 'CHOW') {
                        tiles = meld.tiles;
                    } else if (meld.type === 'KONG') {
                        tiles = [meld.tile, meld.tile, meld.tile, meld.tile];
                    }
                    
                    // 畫每張牌 (size 80%)
                    tiles.forEach((tile) => {
                        // 牌面 (28x38 = 80% of 35x45)
                        this.ctx.fillStyle = '#f8f9fa';
                        this.ctx.fillRect(currentX, startY, 28, 38);
                        
                        // 邊框
                        this.ctx.strokeStyle = '#333';
                        this.ctx.lineWidth = 1;
                        this.ctx.strokeRect(currentX, startY, 28, 38);
                        
                        // 牌面文字 (80% of 16px)
                        this.ctx.fillStyle = this.getTileColor(tile);
                        this.ctx.font = '14px "PingFang HK"';
                        this.ctx.fillText(this.getTileDisplay(tile), currentX + 4, startY + 25);
                        
                        // 移動到下一個位置
                        currentX += 30;  // 28px 寬 + 2px 間距
                    });
                    
                    // 每組之間留多少少空間
                    currentX += 5;
                });
            }
            
            renderDiscardArea(discards) {
                if (!discards) return;
                
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                const width = 1200;
                const height = 360;
                
                this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
                this.ctx.fillRect(centerX - width/2, centerY - height/2, width, height);
                
                this.ctx.strokeStyle = '#d4a373';
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect(centerX - width/2, centerY - height/2, width, height);
                
                this.ctx.fillStyle = 'white';
                this.ctx.font = '20px Arial';
                this.ctx.fillText('棄牌區', centerX - 45, centerY - height/2 + 35);
                
                let startX = centerX - width/2 + 20;
                let startY = centerY - height/2 + 60;

                const tileWidth = 36;
                const tileHeight = 48;
                const tileSpacing = 42;     // 水平間距
                const lineSpacing = 70;      // 垂直行距
                
                for (let i = 0; i < 4; i++) {
                    const playerDiscards = discards[i] || [];
                    const lastTiles = playerDiscards.slice(-30);
                    
                    lastTiles.forEach((tile, index) => {
                        const x = startX + index * tileSpacing;
                        const y = startY + i * lineSpacing;
                        
                        this.ctx.fillStyle = '#f8f9fa';
                        this.ctx.fillRect(x, y, tileWidth, tileHeight);
                        this.ctx.strokeStyle = '#333';
                        this.ctx.strokeRect(x, y, tileWidth, tileHeight);
                        
                        this.ctx.fillStyle = this.getTileColor(tile);
                        this.ctx.font = '18px Arial';
                        this.ctx.fillText(this.getTileDisplay(tile), x + 6, y + 32);
                    });
                }
            }
            
            render(hand, myPosition, discards) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.fillStyle = '#2a6f2a';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.renderDiscardArea(discards);
                
                // 畫副露牌 (喺手牌左方)
                if (window.melds) {
                    this.renderMelds(window.melds, myPosition);
                }
                
                this.ctx.fillStyle = 'white';
                this.ctx.font = '20px Arial';
                this.ctx.fillText(`手牌: ${hand.length} 張`, 20, 50);
                
                // 計算手牌起始位置 (根據副露寬度)
const meldsWidth = this.getMeldsWidth(window.melds, myPosition);
const startX = 50 + meldsWidth;  // 喺副露後面開始畫手牌
                const startY = 550;
                
                hand.forEach((tile, i) => {
                    const x = startX + i * (this.tileWidth + 3);
                    
                    this.ctx.fillStyle = '#f8f9fa';
                    this.ctx.fillRect(x, startY, this.tileWidth, this.tileHeight);
                    
                    this.ctx.strokeStyle = (i === this.selectedIndex) ? 'gold' : '#333';
                    this.ctx.lineWidth = (i === this.selectedIndex) ? 4 : 1;
                    this.ctx.strokeRect(x, startY, this.tileWidth, this.tileHeight);
                    
                    this.ctx.fillStyle = this.getTileColor(tile);
                    this.ctx.font = 'bold 24px "PingFang HK"';
                    this.ctx.fillText(this.getTileDisplay(tile), x + 5, startY + 40);
                });
                
                this.ctx.fillStyle = 'white';
                this.ctx.font = '18px Arial';
                this.ctx.fillText('其他玩家', 500, 200);
                
                this.ctx.fillStyle = window.currentPlayer === myPosition ? 'gold' : 'white';
                this.ctx.fillText(`當前玩家: ${window.currentPlayer === myPosition ? '👈 你' : '其他'}`, 500, 250);
                
                if (!this.gameState) this.gameState = {};
                if (!this.gameState.hands) this.gameState.hands = {};
                
                this.gameState.hands[myPosition] = hand;
                
                if (window.gameState && window.gameState.hands) {
                    for (let i = 0; i < 4; i++) {
                        if (i !== myPosition && window.gameState.hands[i]) {
                            this.gameState.hands[i] = window.gameState.hands[i];
                        }
                    }
                }
                
                if (typeof updateAllHandsCount === 'function') {
                    setTimeout(updateAllHandsCount, 5);
                }
            }
        }

        // ===== 按鈕函數 =====
        window.joinRoom = function() {
            const name = document.getElementById('player-name').value.trim();
            const room = document.getElementById('room-id').value.trim();

            if (!name || !room) {
                alert('❌ 請輸入名字同房間號碼');
                return;
            }

            if (!socket || !socket.connected) {
                alert('❌ 未連接到伺服器');
                return;
            }

            socket.emit('joinRoom', { roomId: room, playerName: name });
        };

        window.createRoom = function() {
            const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('room-id').value = roomId;
            window.joinRoom();
        };

        window.toggleReady = function() {
            if (!socket || !socket.connected) {
                alert('❌ 未連接到伺服器');
                return;
            }

            if (!window.currentRoom) {
                alert('❌ 未加入房間');
                return;
            }

            socket.emit('playerReady', { roomId: window.currentRoom });
        };
        
        window.leaveRoom = function() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            window.currentRoom = '';
        };

        window.closeWinModal = function() {
            document.getElementById('win-modal').style.display = 'none';
        };

        function handleOrientation() {
            const canvas = document.getElementById('game-canvas');
            if (window.innerWidth > window.innerHeight) {
                canvas.width = 1200;
                canvas.height = 700;
            } else {
                canvas.width = 700;
                canvas.height = 1200;
            }
            if (window.gameRenderer && window.myHand) {
                window.gameRenderer.render(window.myHand, window.myPosition, window.discards);
            }
        }
        
        window.addEventListener('resize', handleOrientation);
        handleOrientation();

        document.getElementById('btn-pass-new').addEventListener('click', () => {
            socket.emit('playerAction', {
                roomId: window.currentRoom,
                action: 'PASS',
                tile: null
            });
            hideAllReactionButtons();
        });

        document.getElementById('btn-mahjong-new').addEventListener('click', () => {
            socket.emit('playerAction', {
                roomId: window.currentRoom,
                action: 'MAHJONG',
                tile: null
            });
            hideAllReactionButtons();
        });

        console.log('✅ 前端初始化完成');
    </script>
</body>
</html>
